<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PandaView</title>
<style>
  :root {
    --bg: #0D0A06;
    --panel: rgba(22, 18, 8, 0.88);
    --panel-border: rgba(212, 168, 50, 0.35);
    --gold: #D4A832;
    --gold-dim: #8B6914;
    --gold-bright: #F0C040;
    --cream: #E8DCC8;
    --cream-dim: rgba(232, 220, 200, 0.5);
    --bamboo-dark: #6B5215;
    --bamboo-mid: #9B7A28;
    --bamboo-light: #C4A03A;
    --bamboo-highlight: #D4B44A;
    --bamboo-node: #5A4410;
    --leaf-dark: #4A6A20;
    --leaf-mid: #5C8428;
    --leaf-light: #6E9A30;
    --red: #C0392B;
    --orange: #E67E22;
    --status-ok: #4A9A4A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100%;
    height: 100%;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 0;
  }

  .scene {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bamboo {
    position: absolute;
    bottom: 0;
    background: linear-gradient(
      90deg,
      var(--bamboo-dark) 0%,
      var(--bamboo-mid) 25%,
      var(--bamboo-light) 45%,
      var(--bamboo-highlight) 55%,
      var(--bamboo-light) 65%,
      var(--bamboo-mid) 80%,
      var(--bamboo-dark) 100%
    );
    border-radius: 6px;
    transform-origin: bottom center;
    animation: sway var(--duration) ease-in-out infinite alternate;
    animation-delay: var(--delay);
    box-shadow: 2px 0 8px rgba(0,0,0,0.3), -1px 0 4px rgba(0,0,0,0.2);
  }

  .bamboo-node {
    position: absolute;
    left: -2px;
    right: -2px;
    height: 6px;
    background: var(--bamboo-node);
    border-radius: 3px;
    box-shadow: 0 1px 0 rgba(196, 160, 58, 0.3), 0 -1px 0 rgba(0,0,0,0.3);
  }

  .bamboo .leaf {
    position: absolute;
    height: 6px;
    background: linear-gradient(to right, var(--leaf-dark), var(--leaf-mid), var(--leaf-light));
    border-radius: 0 60% 60% 0;
    transform-origin: left center;
    animation: leaf-sway var(--leaf-dur) ease-in-out infinite alternate;
    animation-delay: var(--leaf-delay);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .bamboo .leaf.left {
    background: linear-gradient(to left, var(--leaf-dark), var(--leaf-mid), var(--leaf-light));
    border-radius: 60% 0 0 60%;
    transform-origin: right center;
  }

  @keyframes sway {
    0% { transform: rotate(calc(var(--sway-amount) * -1)); }
    100% { transform: rotate(var(--sway-amount)); }
  }
  @keyframes leaf-sway {
    0% { transform: rotate(-12deg) scaleX(0.92); }
    100% { transform: rotate(12deg) scaleX(1.08); }
  }

  .firefly {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--gold-bright);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(240, 192, 64, 0.4);
    animation: float var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes float {
    0% { transform: translate(0, 0); opacity: 0; }
    12% { opacity: 0.9; }
    50% { transform: translate(var(--dx), var(--dy)); opacity: 0.2; }
    88% { opacity: 0.7; }
    100% { transform: translate(calc(var(--dx) * 1.5), calc(var(--dy) * 0.5)); opacity: 0; }
  }

  .fog {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 150px;
    background: linear-gradient(to top, rgba(13, 10, 6, 0.8), rgba(22, 18, 8, 0.3), transparent);
    z-index: 1;
  }
  .haze {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: radial-gradient(ellipse at 50% -20%, rgba(212, 168, 50, 0.06) 0%, transparent 70%);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 520px;
    max-width: 95vw;
    flex-shrink: 0;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 28px 32px 24px;
    backdrop-filter: blur(16px);
    box-shadow:
      0 0 60px rgba(212, 168, 50, 0.06),
      0 0 120px rgba(13, 10, 6, 0.5),
      inset 0 1px 0 rgba(212, 168, 50, 0.08);
    position: relative;
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: var(--gold-dim);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .card::before {
    top: -1px; left: -1px;
    border-top-width: 2px;
    border-left-width: 2px;
    border-radius: 8px 0 0 0;
  }
  .card::after {
    top: -1px; right: -1px;
    border-top-width: 2px;
    border-right-width: 2px;
    border-radius: 0 8px 0 0;
  }
  .card-inner { position: relative; }
  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: var(--gold-dim);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .card-inner::before {
    bottom: -1px; left: -1px;
    border-bottom-width: 2px;
    border-left-width: 2px;
    border-radius: 0 0 0 8px;
  }
  .card-inner::after {
    bottom: -1px; right: -1px;
    border-bottom-width: 2px;
    border-right-width: 2px;
    border-radius: 0 0 8px 0;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 20px;
  }
  .logo-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 10px;
    position: relative;
  }
  .logo-glow {
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 168, 50, 0.18) 0%, transparent 70%);
    animation: glow-pulse 3s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  .logo-img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    position: relative;
    z-index: 1;
    background: var(--bg);
    object-fit: cover;
  }
  .brand-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    margin: 16px 0;
  }

  .status-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .status-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--status-ok);
    box-shadow: 0 0 6px rgba(74, 154, 74, 0.5);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  .status-dot.degraded { background: var(--orange); box-shadow: 0 0 6px rgba(230, 126, 34, 0.5); }
  .status-dot.major { background: var(--red); box-shadow: 0 0 6px rgba(192, 57, 43, 0.5); }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .stat-box {
    flex: 1;
    background: rgba(13, 10, 6, 0.5);
    border: 1px solid rgba(139, 105, 20, 0.2);
    border-radius: 5px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--cream-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .stat-value.time {
    font-family: 'Consolas', 'Courier New', monospace;
    color: var(--gold-bright);
    font-size: 16px;
  }
  .stat-value .status-text { font-size: 13px; font-weight: 600; }
  .stat-value .status-text.ok { color: var(--status-ok); }
  .stat-value .status-text.degraded { color: var(--orange); }
  .stat-value .status-text.major { color: var(--red); }

  .ticker-wrap {
    overflow: hidden;
    background: rgba(230, 126, 34, 0.08);
    border: 1px solid rgba(230, 126, 34, 0.2);
    border-radius: 4px;
    margin-bottom: 14px;
    padding: 6px 0;
    display: none;
  }
  .ticker-wrap.active { display: block; }
  .ticker-track {
    display: flex;
    gap: 0;
    width: max-content;
    animation: ticker-scroll var(--ticker-dur, 20s) linear infinite;
  }
  .ticker-track:hover { animation-play-state: paused; }
  .ticker-item {
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 0 24px;
    color: var(--cream);
  }
  .ticker-item .svc-name { color: var(--cream); }
  .ticker-item .svc-status { font-weight: 600; margin-left: 5px; }
  .ticker-item .svc-status.degraded { color: var(--orange); }
  .ticker-item .svc-status.major { color: var(--red); }
  .ticker-item .svc-status.partial { color: var(--gold); }
  .ticker-sep {
    color: var(--gold-dim);
    padding: 0 4px;
    opacity: 0.4;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .outages-section { margin-top: 14px; }
  .outages-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }
  .outage-item {
    padding: 8px 10px;
    background: rgba(13, 10, 6, 0.4);
    border-left: 2px solid var(--orange);
    border-radius: 0 4px 4px 0;
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.4;
  }
  .outage-item.resolved {
    border-left-color: var(--status-ok);
    opacity: 0.6;
  }
  .outage-item.major {
    border-left-color: var(--red);
  }
  .outage-time {
    font-size: 10px;
    color: var(--cream-dim);
    white-space: nowrap;
  }
  .outage-text { color: var(--cream); }
  .outage-tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    white-space: nowrap;
    display: inline-block;
  }
  .outage-tag.investigating { background: rgba(230, 126, 34, 0.2); color: var(--orange); }
  .outage-tag.resolved { background: rgba(74, 154, 74, 0.2); color: var(--status-ok); }
  .outage-tag.monitoring { background: rgba(212, 168, 50, 0.2); color: var(--gold); }
  .outage-tag.identified { background: rgba(230, 126, 34, 0.2); color: var(--orange); }
  .outage-tag.scheduled { background: rgba(100, 140, 200, 0.2); color: #7EAAD4; }
  .outage-tag.major { background: rgba(192, 57, 43, 0.2); color: var(--red); }

  .no-outages {
    font-size: 12px;
    color: var(--cream-dim);
    text-align: center;
    padding: 8px;
    font-style: italic;
  }

  .footer {
    text-align: center;
    margin-top: 12px;
    font-size: 10px;
    color: rgba(232, 220, 200, 0.25);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="haze"></div>
  <div class="fog"></div>
</div>

<div class="content">
  <div class="card">
    <div class="card-inner">
      <div class="logo-section">
        <div class="logo-icon">
          <div class="logo-glow"></div>
          <img class="logo-img" src="icon.png" alt="PandaView">
        </div>
        <div class="brand-name">PandaView</div>
        <div class="brand-sub">Second Life Viewer</div>
      </div>

      <div class="divider"></div>

      <div class="status-header">
        <div class="status-dot" id="gridDot"></div>
        <h2>Grid Status</h2>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Status</div>
          <div class="stat-value"><span class="status-text ok" id="gridStatus">Checking...</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Residents Online</div>
          <div class="stat-value" id="onlineCount">--</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">SL Time</div>
          <div class="stat-value time" id="slTime">--:--</div>
        </div>
      </div>

      <div class="ticker-wrap" id="tickerWrap">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>

      <div class="outages-section">
        <div class="outages-header">Recent Incidents</div>
        <div id="outagesList">
          <div class="no-outages">Checking grid status...</div>
        </div>
      </div>

      <div class="divider" style="margin-top: 16px;"></div>
      <div class="footer">PANDAVIEW v1.3.1</div>
    </div>
  </div>
</div>

<script>
// ---- Bamboo forest generation ----
const scene = document.getElementById('scene');

function addBamboo(xPct, height, thickness, opacity, swayDeg) {
  const stalk = document.createElement('div');
  stalk.className = 'bamboo';
  stalk.style.left = xPct + '%';
  stalk.style.height = height + 'vh';
  stalk.style.width = thickness + 'px';
  stalk.style.opacity = opacity;
  stalk.style.setProperty('--duration', (3.5 + Math.random() * 3) + 's');
  stalk.style.setProperty('--delay', (-Math.random() * 5) + 's');
  stalk.style.setProperty('--sway-amount', swayDeg + 'deg');

  const hPx = window.innerHeight * (height / 100);
  const nodeSpacing = 70 + Math.random() * 30;
  const nodeCount = Math.floor(hPx / nodeSpacing);
  for (let n = 1; n < nodeCount; n++) {
    const node = document.createElement('div');
    node.className = 'bamboo-node';
    node.style.top = (n * nodeSpacing) + 'px';
    stalk.appendChild(node);

    if (Math.random() > 0.3) {
      const side = Math.random() > 0.5 ? 'right' : 'left';
      const leafCount = 1 + Math.floor(Math.random() * 3);
      for (let l = 0; l < leafCount; l++) {
        const leaf = document.createElement('div');
        leaf.className = 'leaf ' + (side === 'left' ? 'left' : '');
        leaf.style.width = (20 + Math.random() * 25 + thickness * 1.5) + 'px';
        leaf.style.height = (4 + Math.random() * 3) + 'px';
        leaf.style.top = (n * nodeSpacing - 4 + l * 6) + 'px';
        if (side === 'left') {
          leaf.style.right = (thickness + 1) + 'px';
        } else {
          leaf.style.left = (thickness + 1) + 'px';
        }
        leaf.style.setProperty('--leaf-dur', (2 + Math.random() * 2.5) + 's');
        leaf.style.setProperty('--leaf-delay', (-Math.random() * 4) + 's');
        leaf.style.transform = 'rotate(' + (-15 + Math.random() * 30) + 'deg)';
        stalk.appendChild(leaf);
      }
    }
  }
  scene.appendChild(stalk);
}

function buildForest() {
  scene.querySelectorAll('.bamboo, .firefly').forEach(el => el.remove());

  // Left forest — 3 layers (positions as % of viewport width)
  for (let i = 0; i < 10; i++) addBamboo(-2 + Math.random() * 14, 50 + Math.random() * 30, 6 + Math.random() * 4, 0.2 + Math.random() * 0.1, 0.5 + Math.random() * 0.5);
  for (let i = 0; i < 12; i++) addBamboo(-1 + Math.random() * 13, 60 + Math.random() * 35, 10 + Math.random() * 6, 0.45 + Math.random() * 0.15, 0.8 + Math.random() * 0.7);
  for (let i = 0; i < 8; i++) addBamboo(0 + Math.random() * 12, 70 + Math.random() * 30, 14 + Math.random() * 10, 0.7 + Math.random() * 0.3, 1.0 + Math.random() * 1.0);

  // Right forest — 3 layers
  for (let i = 0; i < 10; i++) addBamboo(86 + Math.random() * 16, 50 + Math.random() * 30, 6 + Math.random() * 4, 0.2 + Math.random() * 0.1, 0.5 + Math.random() * 0.5);
  for (let i = 0; i < 12; i++) addBamboo(87 + Math.random() * 14, 60 + Math.random() * 35, 10 + Math.random() * 6, 0.45 + Math.random() * 0.15, 0.8 + Math.random() * 0.7);
  for (let i = 0; i < 8; i++) addBamboo(88 + Math.random() * 13, 70 + Math.random() * 30, 14 + Math.random() * 10, 0.7 + Math.random() * 0.3, 1.0 + Math.random() * 1.0);

  // Mid-ground background stalks
  for (let i = 0; i < 14; i++) addBamboo(14 + Math.random() * 72, 30 + Math.random() * 35, 5 + Math.random() * 5, 0.08 + Math.random() * 0.08, 0.4 + Math.random() * 0.4);

  // Fireflies
  for (let i = 0; i < 28; i++) {
    const ff = document.createElement('div');
    ff.className = 'firefly';
    ff.style.left = (Math.random() * 100) + '%';
    ff.style.top = (10 + Math.random() * 70) + '%';
    ff.style.setProperty('--dur', (5 + Math.random() * 8) + 's');
    ff.style.setProperty('--delay', (-Math.random() * 12) + 's');
    ff.style.setProperty('--dx', (-40 + Math.random() * 80) + 'px');
    ff.style.setProperty('--dy', (-50 + Math.random() * 100) + 'px');
    scene.appendChild(ff);
  }
}

buildForest();
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildForest, 300);
});

// ---- SL Time (Pacific Time) ----
function updateSLTime() {
  try {
    const now = new Date();
    const opts = { timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    document.getElementById('slTime').textContent = now.toLocaleTimeString('en-US', opts);
  } catch(e) {
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset() * 60000;
    const pst = new Date(utc - 7 * 3600000);
    document.getElementById('slTime').textContent =
      pst.getHours().toString().padStart(2,'0') + ':' +
      pst.getMinutes().toString().padStart(2,'0') + ':' +
      pst.getSeconds().toString().padStart(2,'0');
  }
}
updateSLTime();
setInterval(updateSLTime, 1000);

// ---- Grid Status (from status.secondlifegrid.net RSS) ----
async function fetchGridStatus() {
  const statusEl = document.getElementById('gridStatus');
  const dotEl = document.getElementById('gridDot');
  const outagesEl = document.getElementById('outagesList');

  try {
    // Fetch the status page RSS feed via a CORS proxy, or directly if allowed
    const statusUrl = 'https://status.secondlifegrid.net/history.rss';
    let rssText = '';

    // Try fetching directly first
    try {
      const resp = await fetch(statusUrl);
      if (resp.ok) rssText = await resp.text();
    } catch(e) {}

    // If direct fetch failed, try corsproxy
    if (!rssText) {
      try {
        const resp = await fetch('https://corsproxy.io/?' + encodeURIComponent(statusUrl));
        if (resp.ok) rssText = await resp.text();
      } catch(e) {}
    }

    if (rssText) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(rssText, 'text/xml');
      const items = xml.querySelectorAll('item');

      let hasActiveIncident = false;
      let incidents = [];
      const threeDaysMs = 3 * 24 * 3600000;

      for (let i = 0; i < items.length; i++) {
        const title = items[i].querySelector('title')?.textContent || '';
        const pubDate = items[i].querySelector('pubDate')?.textContent || '';

        const diff = pubDate ? Date.now() - new Date(pubDate).getTime() : 0;
        const absDiff = Math.abs(diff);
        const isFuture = diff < 0;

        if (!isFuture && diff > threeDaysMs) continue;
        if (isFuture && absDiff > threeDaysMs) continue;

        let status = 'monitoring';
        const titleLower = title.toLowerCase();
        if (titleLower.includes('resolved') || titleLower.includes('completed')) {
          continue;
        } else if (isFuture) {
          status = 'scheduled';
        } else if (titleLower.includes('investigating')) {
          status = 'investigating';
          hasActiveIncident = true;
        } else if (titleLower.includes('identified')) {
          status = 'identified';
          hasActiveIncident = true;
        } else if (titleLower.includes('monitoring') || titleLower.includes('update')) {
          status = 'monitoring';
          hasActiveIncident = true;
        } else {
          continue;
        }

        let timeAgo = '';
        if (pubDate) {
          const hours = Math.floor(absDiff / 3600000);
          const days = Math.floor(hours / 24);
          if (isFuture) {
            if (days > 0) timeAgo = 'in ' + days + 'd';
            else if (hours > 0) timeAgo = 'in ' + hours + 'h';
            else timeAgo = 'in ' + Math.floor(absDiff / 60000) + 'm';
          } else {
            if (days > 0) timeAgo = days + 'd ago';
            else if (hours > 0) timeAgo = hours + 'h ago';
            else timeAgo = Math.floor(diff / 60000) + 'm ago';
          }
        }

        incidents.push({ title, status, timeAgo });
      }

      // Live issues first, then scheduled
      incidents.sort((a, b) => {
        const aLive = a.status !== 'scheduled' ? 1 : 0;
        const bLive = b.status !== 'scheduled' ? 1 : 0;
        return bLive - aLive;
      });

      // Update grid status indicator
      if (hasActiveIncident) {
        statusEl.textContent = 'Degraded';
        statusEl.className = 'status-text degraded';
        dotEl.className = 'status-dot degraded';
      } else {
        statusEl.textContent = 'Online';
        statusEl.className = 'status-text ok';
        dotEl.className = 'status-dot';
      }

      // Render incidents
      if (incidents.length > 0) {
        outagesEl.innerHTML = incidents.map(inc => {
          const itemClass = inc.status === 'investigating' ? 'outage-item major' : 'outage-item';
          return `<div class="${itemClass}">
            <div>
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
                <span class="outage-tag ${inc.status}">${inc.status}</span>
                <span class="outage-time">${inc.timeAgo}</span>
              </div>
              <div class="outage-text">${inc.title.replace(/<[^>]*>/g, '')}</div>
            </div>
          </div>`;
        }).join('');
      } else {
        outagesEl.innerHTML = '<div class="no-outages">All clear — no active issues</div>';
      }
    } else {
      statusEl.textContent = 'Online';
      statusEl.className = 'status-text ok';
      outagesEl.innerHTML = '<div class="no-outages">No recent incidents</div>';
    }
  } catch(e) {
    statusEl.textContent = 'Online';
    statusEl.className = 'status-text ok';
    outagesEl.innerHTML = '<div class="no-outages">Unable to fetch status</div>';
  }
}

// ---- Online count (from SL official API) ----
async function fetchOnlineCount() {
  const countEl = document.getElementById('onlineCount');

  function parseCount(text) {
    const lines = text.split(/\r?\n/);
    for (let i = 0; i < lines.length - 1; i++) {
      if (lines[i].trim() === 'inworld') {
        const num = parseInt(lines[i + 1].trim());
        if (!isNaN(num)) return num;
      }
    }
    return null;
  }

  try {
    const resp = await fetch('https://api.secondlife.com/datafeeds/homepage.txt');
    if (resp.ok) {
      const count = parseCount(await resp.text());
      if (count !== null) { countEl.textContent = count.toLocaleString(); return; }
    }
  } catch(e) {}

  try {
    const resp = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.secondlife.com/datafeeds/homepage.txt'));
    if (resp.ok) {
      const count = parseCount(await resp.text());
      if (count !== null) { countEl.textContent = count.toLocaleString(); return; }
    }
  } catch(e) {}

  countEl.textContent = '--';
}

// ---- Service status ticker ----
async function fetchServiceStatus() {
  const wrap = document.getElementById('tickerWrap');
  const track = document.getElementById('tickerTrack');

  try {
    const url = 'https://status.secondlifegrid.net/api/v2/components.json';
    let data;
    try {
      const resp = await fetch(url);
      if (resp.ok) data = await resp.json();
    } catch(e) {}
    if (!data) {
      const resp = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      if (resp.ok) data = await resp.json();
    }
    if (!data) return;

    const badServices = data.components.filter(c => c.status !== 'operational' && !c.group);
    if (badServices.length === 0) {
      wrap.classList.remove('active');
      return;
    }

    const statusLabel = s => s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const statusClass = s => s.includes('major') || s.includes('critical') ? 'major' : s.includes('partial') ? 'partial' : 'degraded';

    const items = badServices.map(c =>
      `<span class="ticker-item"><span class="svc-name">${c.name}</span><span class="svc-status ${statusClass(c.status)}">${statusLabel(c.status)}</span></span>`
    ).join('<span class="ticker-sep">•</span>');

    track.innerHTML = items + '<span class="ticker-sep">•</span>' + items + '<span class="ticker-sep">•</span>';

    const dur = Math.max(12, badServices.length * 5);
    wrap.style.setProperty('--ticker-dur', dur + 's');
    wrap.classList.add('active');
  } catch(e) {}
}

// Fetch data on load
fetchGridStatus();
fetchOnlineCount();
fetchServiceStatus();

// Refresh every 5 minutes
setInterval(fetchGridStatus, 300000);
setInterval(fetchOnlineCount, 300000);
setInterval(fetchServiceStatus, 300000);
</script>
